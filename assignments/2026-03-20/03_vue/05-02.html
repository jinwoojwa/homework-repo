<div id="app">
  금액: <input type="text" v-model.number="amount" /> <br />
  <button @click="deposit">입금</button>
  <button @click="withdraw">인출</button>
  <br />
  <h3>계좌 잔고: [{{balance}}]</h3>
</div>

<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return {
        amount: 0,
        balance: 0,
      };
    },
    methods: {
      deposit() {
        let money = parseInt(this.amount);
        this.balance += money;
      },
      withdraw() {
        let money = parseInt(this.amount);
        this.balance -= money;
      },
    },
  }).mount('#app');
</script>
