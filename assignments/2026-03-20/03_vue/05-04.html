<div id="app">
  <input
    type="text"
    :value="name"
    @input="(event) => this.name = event.target.value"
  />
  <br />
  이름: <span>{{name}}</span>
</div>
<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return {
        name: '',
      };
    },
  }).mount('#app');
</script>
